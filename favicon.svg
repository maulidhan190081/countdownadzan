<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f0ff" />
            <stop offset="100%" stop-color="#0ea5e9" />
        </linearGradient>
    </defs>
    <!-- Dark glassmorphism circle bg -->
    <circle cx="50" cy="50" r="45" fill="rgba(20, 26, 40, 0.9)" stroke="rgba(0, 240, 255, 0.3)" stroke-width="2"/>
    <!-- Glowing crescent moon -->
    <path d="M 60 25 A 25 25 0 1 0 75 70 A 30 30 0 1 1 60 25 Z" fill="url(#moonGrad)" filter="url(#glow)"/>
    <!-- Center star -->
    <polygon points="50,40 54,48 62,49 56,55 58,63 50,59 42,63 44,55 38,49 46,48" fill="#00f0ff" opacity="0.8"/>
</svg>
